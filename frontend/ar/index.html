<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>AR Charts Viewer</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /**
       * HUD must be *after* <a-scene> in the DOM and sit above the WebGL layer.
       * (Earlier siblings paint under the A-Frame canvas, so fixed UI looked “missing”.)
       */
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
      }

      #ar-scene {
        z-index: 0;
        position: relative;
      }

      #ar-hud {
        position: fixed;
        inset: 0;
        z-index: 100000;
        pointer-events: none;
      }

      #ar-hud .hud-interactive {
        pointer-events: auto;
      }

      #status {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        z-index: 1;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(17, 24, 39, 0.9);
        color: #e5e7eb;
        font-size: 0.95rem;
        line-height: 1.4;
        border: 1px solid rgba(148, 163, 184, 0.35);
      }

      #status strong {
        color: #93c5fd;
      }

      #camera-toggle {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 2;
        min-height: 48px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid #475569;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 0.95rem;
        font-weight: 600;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      }

      #camera-panel {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: max(70px, calc(12px + env(safe-area-inset-bottom)));
        z-index: 2;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(17, 24, 39, 0.95);
        color: #e5e7eb;
        border: 1px solid rgba(148, 163, 184, 0.35);
        max-height: 50vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #camera-panel[aria-hidden="true"] {
        display: none;
      }

      #camera-panel label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.35rem;
      }

      #camera-select {
        width: 100%;
        margin-bottom: 0.5rem;
        padding: 0.55rem 0.5rem;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.9rem;
      }

      #refresh-cameras {
        width: 100%;
        margin-bottom: 0.75rem;
        min-height: 44px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
        font-size: 0.9rem;
      }

      #zoom-slider {
        width: 100%;
        touch-action: manipulation;
      }

      #zoom-note {
        margin-top: 0.35rem;
        font-size: 0.8rem;
        color: #93c5fd;
      }

      @media (max-width: 480px) {
        #status {
          left: 8px;
          right: 8px;
          padding: 10px 12px;
          font-size: 0.9rem;
        }

        #camera-panel {
          left: 8px;
          right: 8px;
        }
      }
    </style>
  </head>
  <body>
    <a-scene
      id="ar-scene"
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;"
    >
      <a-marker preset="hiro" id="chart-marker"></a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <div id="ar-hud">
      <div id="status" class="hud-interactive">
        <strong>Waiting for marker…</strong> Allow camera access and point at a Hiro
        marker. Tap <em>Camera</em> (bottom-right) to pick lens or zoom.
      </div>
      <button
        type="button"
        id="camera-toggle"
        class="hud-interactive"
        aria-controls="camera-panel"
        aria-expanded="true"
      >
        Camera
      </button>
      <div
        id="camera-panel"
        class="hud-interactive"
        role="region"
        aria-label="Camera settings"
        aria-hidden="false"
      >
        <label for="camera-select">Camera</label>
        <select id="camera-select" aria-label="Choose camera"></select>
        <button type="button" id="refresh-cameras">Refresh camera list</button>
        <label for="zoom-slider">Zoom</label>
        <input
          id="zoom-slider"
          type="range"
          min="1"
          max="1"
          step="0.1"
          value="1"
        />
        <div id="zoom-note">Open panel after the camera stream starts…</div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
