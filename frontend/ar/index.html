<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Charts Viewer</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Inter, system-ui, sans-serif;
      }

      #status {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        z-index: 999;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(17, 24, 39, 0.88);
        color: #e5e7eb;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      #camera-controls {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 999;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(17, 24, 39, 0.82);
        color: #e5e7eb;
      }

      #camera-controls label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.35rem;
      }

      #zoom-slider {
        width: 100%;
      }

      #zoom-note {
        margin-top: 0.35rem;
        font-size: 0.8rem;
        color: #93c5fd;
      }

      @media (max-width: 480px) {
        #status {
          left: 8px;
          right: 8px;
          padding: 10px 12px;
          font-size: 0.9rem;
        }

        #camera-controls {
          left: 8px;
          right: 8px;
        }
      }

      #status strong {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div id="status">
      <strong>Waiting for marker...</strong> Allow camera access and point to a Hiro marker.
    </div>
    <div id="camera-controls" hidden>
      <label for="zoom-slider">Camera zoom</label>
      <input id="zoom-slider" type="range" min="1" max="1" step="0.1" value="1" />
      <div id="zoom-note">Rear camera is preferred automatically on supported phones.</div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;"
    >
      <a-marker preset="hiro" id="chart-marker"></a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script type="module" src="./main.js"></script>
  </body>
</html>
